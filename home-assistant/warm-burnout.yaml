      switch-checked-button-color: "#b8522e"
      switch-checked-track-color: "rgba(184, 82, 46, 0.4)"
      switch-unchecked-button-color: "#ada69c"
      switch-unchecked-track-color: "rgba(180, 168, 156, 0.3)"

      # ── Sliders ──
      slider-color: "#b8522e"
      slider-secondary-color: "rgba(184, 82, 46, 0.4)"
      slider-bar-color: "rgba(191, 189, 182, 0.12)"

