Warm Burnout:
  modes:
    dark:
      # ── Text ──
      primary-text-color: "#bfbdb6"
      secondary-text-color: "#ada69c"
      text-primary-color: "#FAF6F0"
      text-light-primary-color: "#FAF6F0"
      disabled-text-color: "rgba(191, 189, 182, 0.5)"

      # ── Interface ──
      primary-color: "#b8522e"
      dark-primary-color: "#8a3d22"
      light-primary-color: "#90aec0"
      accent-color: "#b8522e"
      divider-color: "rgba(191, 189, 182, 0.12)"
      scrollbar-thumb-color: "rgba(191, 189, 182, 0.3)"

      # ── Feedback ──
      error-color: "#f49090"
      warning-color: "#ffb454"
      success-color: "#b4bc78"
      info-color: "#90aec0"

      # ── States ──
      state-icon-color: "#ada69c"
      state-icon-active-color: "#b8522e"
      state-icon-unavailable-color: "rgba(180, 168, 156, 0.5)"

      # ── Backgrounds ──
      primary-background-color: "#1a1510"
      secondary-background-color: "#14120f"
      card-background-color: "#1f1d17"
      ha-card-background: "#1f1d17"

      # ── Card styling ──
      ha-card-border-radius: "16px"
      ha-card-border-width: "0"
      ha-card-border-color: "transparent"
      ha-card-box-shadow: "0 2px 8px 0 rgba(20, 12, 6, 0.25)"

      # ── Badges ──
      label-badge-red: "#f49090"
      label-badge-blue: "#90aec0"
      label-badge-green: "#b4bc78"
      label-badge-yellow: "#ffb454"
      label-badge-grey: "#ada69c"
      label-badge-background-color: "#1f1d17"
      label-badge-text-color: "#bfbdb6"

      # ── Opacity ──
      dark-divider-opacity: "0.12"
      dark-disabled-opacity: "0.5"
      dark-secondary-opacity: "0.7"
      dark-primary-opacity: "1.0"
      light-divider-opacity: "0.12"
      light-disabled-opacity: "0.5"
      light-secondary-opacity: "0.7"
      light-primary-opacity: "1.0"

      # ── RGB tokens ──
      rgb-primary-color: "184, 82, 46"
      rgb-accent-color: "184, 82, 46"
      rgb-primary-text-color: "191, 189, 182"
      rgb-secondary-text-color: "173, 166, 156"
      rgb-text-primary-color: "250, 246, 240"
