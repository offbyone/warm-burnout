# Warm Burnout -- Starship example config
# Uses terminal ANSI colors so dark/light switching is handled by the terminal.
# Pair with Warm Burnout for Ghostty (or any terminal with the Warm Burnout theme).

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[character]
success_symbol = "[‚ĚĮ](yellow)"
error_symbol = "[‚ĚĮ](red)"
vimcmd_symbol = "[‚Ěģ](green)"

[directory]
truncation_length = 8
style = "bold bright-yellow"

[git_branch]
format = "[$branch]($style)"
style = "blue"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](red) ($ahead_behind$stashed)]($style)"
style = "blue"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "bright-black"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
