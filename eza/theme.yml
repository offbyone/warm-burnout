colourful: true
# Warm Burnout Dark -- eza theme
#
# Palette reference:
#   foreground  #bfbdb6    comment     #aea195
#   amber       #ffb454    burnt_orange #ff8f40
#   gold        #e6c08a    aged_brass   #deb074
#   terra_cotta #d49484    coral        #f58088
#   dusty_mauve #d4a8b8    dried_sage   #b4bc78
#   verdigris   #96b898    steel_patina #8aa8b8
#   error       #f08888    accent       #b8522e

filekinds:
  normal:
    foreground: "#bfbdb6"
  directory:
    foreground: "#deb074"
  symlink:
    foreground: "#96b898"
  pipe:
    foreground: "#aea195"
  block_device:
    foreground: "#f08888"
  char_device:
    foreground: "#f08888"
  socket:
    foreground: "#aea195"
  special:
    foreground: "#d4a8b8"
  executable:
    foreground: "#b4bc78"
  mount_point:
    foreground: "#ff8f40"

perms:
  user_read:
    foreground: "#e6c08a"
  user_write:
    foreground: "#f58088"
  user_execute_file:
    foreground: "#b4bc78"
  user_execute_other:
    foreground: "#b4bc78"
  group_read:
    foreground: "#e6c08a"
  group_write:
    foreground: "#f58088"
  group_execute:
    foreground: "#b4bc78"
  other_read:
    foreground: "#e6c08a"
  other_write:
    foreground: "#f58088"
  other_execute:
    foreground: "#b4bc78"
  special_user_file:
    foreground: "#d4a8b8"
  special_other:
    foreground: "#aea195"
  attribute:
    foreground: "#ada69c"

size:
  major:
    foreground: "#ada69c"
  minor:
    foreground: "#96b898"
  number_byte:
    foreground: "#bfbdb6"
  number_kilo:
    foreground: "#b4bc78"
  number_mega:
    foreground: "#ffb454"
  number_giga:
    foreground: "#f58088"
  number_huge:
    foreground: "#f08888"
  unit_byte:
    foreground: "#ada69c"
  unit_kilo:
    foreground: "#ada69c"
  unit_mega:
    foreground: "#ada69c"
  unit_giga:
    foreground: "#ada69c"
  unit_huge:
    foreground: "#ada69c"

users:
  user_you:
    foreground: "#e6c08a"
  user_root:
    foreground: "#f08888"
  user_other:
    foreground: "#d4a8b8"
  group_yours:
    foreground: "#e6c08a"
  group_other:
    foreground: "#aea195"
  group_root:
    foreground: "#f08888"

links:
  normal:
    foreground: "#96b898"
  multi_link_file:
    foreground: "#ff8f40"

git:
  new:
    foreground: "#b4bc78"
  modified:
    foreground: "#ffb454"
  deleted:
    foreground: "#f58088"
  renamed:
    foreground: "#96b898"
  typechange:
    foreground: "#d4a8b8"
  ignored:
    foreground: "#aea195"
  conflicted:
    foreground: "#f08888"

git_repo:
  branch_main:
    foreground: "#bfbdb6"
  branch_other:
    foreground: "#d4a8b8"
  git_clean:
    foreground: "#b4bc78"
  git_dirty:
    foreground: "#f58088"

security_context:
  colon:
    foreground: "#aea195"
  user:
    foreground: "#bfbdb6"
  role:
    foreground: "#d4a8b8"
  typ:
    foreground: "#aea195"
  range:
    foreground: "#d4a8b8"

file_type:
  image:
    foreground: "#ffb454"
  video:
    foreground: "#f58088"
  music:
    foreground: "#b4bc78"
  lossless:
    foreground: "#96b898"
  crypto:
    foreground: "#aea195"
  document:
    foreground: "#bfbdb6"
  compressed:
    foreground: "#d4a8b8"
  temp:
    foreground: "#f08888"
  compiled:
    foreground: "#8aa8b8"
  build:
    foreground: "#aea195"
  source:
    foreground: "#8aa8b8"

punctuation:
  foreground: "#aea195"

date:
  foreground: "#aea195"

inode:
  foreground: "#ada69c"

blocks:
  foreground: "#ada69c"

header:
  foreground: "#bfbdb6"
  is_bold: true

octal:
  foreground: "#96b898"

flags:
  foreground: "#d4a8b8"

symlink_path:
  foreground: "#96b898"

control_char:
  foreground: "#8aa8b8"

broken_symlink:
  foreground: "#f08888"

broken_path_overlay:
  foreground: "#aea195"
